name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # Use `npm install` (not `npm ci`): the lockfile is generated on Windows, where
      # npm omits Linux-only optional deps (e.g. @emnapi/*, Rollup's native binary),
      # so `npm ci`'s strict sync check fails on the Linux runner.
      - run: npm install --no-audit --no-fund
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build
      - run: npm test
